name: CI Workflow Advance

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Run actions/checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Check Env
      run: python --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn matplotlib seaborn

    - name: Run mlflow project
      run: mlflow run MLProject --env-manager=local

    - name: Get latest MLflow run_id
      run: |
        # Mengambil ID unik dari folder mlruns
        RUN_ID=$(ls mlruns/0 | grep -E '^[a-z0-9]+$' | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id is $RUN_ID"

    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: mlruns/0/${{ env.RUN_ID }}/artifacts/

    - name: Build Docker Model
      run: mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n "titanic-model"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker Image
      run: docker tag titanic-model:latest ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest